<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top-Down Car Demo</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #111;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <script>
    // ============================================================
    // TUNABLES — single source of truth for all gameplay constants
    // Downstream rows must NOT add new tunables outside this block.
    // ============================================================

    const ACCEL             = 400;   // forward acceleration (px/s²)
    const REVERSE_ACCEL     = 200;   // reverse acceleration (px/s²)
    const TOP_SPEED         = 600;   // max forward speed (px/s)
    const TOP_REVERSE_SPEED = 250;   // max reverse speed (px/s)
    const FRICTION          = 0.92;  // per-frame speed retention (0–1); applied as speed *= FRICTION each frame
    const STEER_RATE        = 2.5;   // steering angular velocity (rad/s)
    const GRIP              = 0.85;  // lateral grip blend factor (0–1)
                                     // INVARIANT: GRIP * MAX_DT < 1 (0.85 * 0.033 = 0.028 — safe)
    const HANDBRAKE_GRIP    = 0.05;  // grip while handbrake held (allows sliding)
    const OBSTACLE_COUNT    = 10;    // number of obstacles in arena
    const ARENA_SIZE        = 3000;  // arena width/height (px)
    const RESTITUTION       = 0.6;   // collision bounce factor (not WALL_BOUNCE — locked name)
    const GRID_SIZE         = 100;   // spatial-hash cell size (px) for broad-phase collision
    const SKID_THRESHOLD    = 80;    // lateral speed (px/s) above which skid marks appear
    const SKID_MAX          = 300;   // lateral speed (px/s) at which skid marks reach max opacity
    const MAX_DT            = 0.033; // dt cap (s) — clamps slow frames; 1/30 ≈ 0.033
    const BRAKE_MULTIPLIER  = 1.5;   // brake force relative to ACCEL (braking is stronger than accelerating)
    const CAR_RADIUS        = 18;    // approximate car collision radius (px)
    const OBS_RADIUS_T      = 30;    // obstacle circle radius (px)

    // ============================================================
    // CANVAS SETUP
    // ============================================================

    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // ============================================================
    // GAME STATE — car object (physics implemented by CAR-3)
    // ============================================================

    const car = {
      x: ARENA_SIZE / 2,
      y: ARENA_SIZE / 2,
      vx: 0,
      vy: 0,
      heading: 0,
      handbrake: false,
      lateralSlip: 0
    };

    // ============================================================
    // INPUT STATE — held-key map (populated by CAR-4 event listeners)
    // ============================================================

    const keys = {};

    // ============================================================
    // OBSTACLES — static circles scattered across arena
    // ============================================================
    const obstacles = [];
    (function spawnObstacles() {
      const MIN_DIST_FROM_CENTER = 200; // keep spawn zone clear
      while (obstacles.length < OBSTACLE_COUNT) {
        const x = OBS_RADIUS_T + Math.random() * (ARENA_SIZE - OBS_RADIUS_T * 2);
        const y = OBS_RADIUS_T + Math.random() * (ARENA_SIZE - OBS_RADIUS_T * 2);
        const dx = x - ARENA_SIZE / 2, dy = y - ARENA_SIZE / 2;
        if (Math.sqrt(dx*dx + dy*dy) > MIN_DIST_FROM_CENTER) {
          obstacles.push({ x, y, r: OBS_RADIUS_T });
        }
      }
    })();

    // ============================================================
    // PHYSICS UPDATE
    // ============================================================

    function update(dt) {
      // --- inputs (keys populated by CAR-4; stubs for now so we can test physics manually) ---
      const throttle   = (keys['KeyW'] || keys['ArrowUp'])    ? 1 : 0;
      const brake      = (keys['KeyS'] || keys['ArrowDown'])  ? 1 : 0;
      const steerInput = ((keys['KeyD'] || keys['ArrowRight']) ? 1 : 0)
                       - ((keys['KeyA'] || keys['ArrowLeft'])  ? 1 : 0);
      car.handbrake = !!(keys['Space']);

      // --- heading and velocity vectors ---
      const cosH = Math.cos(car.heading);
      const sinH = Math.sin(car.heading);

      // project velocity onto forward axis (lateral decomposition done later for GRIP)
      const forwardVel = car.vx * cosH + car.vy * sinH;

      // throttle / brake / reverse along heading
      if (throttle) {
        car.vx += cosH * ACCEL * dt;
        car.vy += sinH * ACCEL * dt;
      }
      if (brake) {
        if (forwardVel > 0) {
          // braking
          car.vx -= cosH * ACCEL * dt * BRAKE_MULTIPLIER;
          car.vy -= sinH * ACCEL * dt * BRAKE_MULTIPLIER;
        } else {
          // reversing
          car.vx -= cosH * REVERSE_ACCEL * dt;
          car.vy -= sinH * REVERSE_ACCEL * dt;
        }
      }

      // friction (drag) when coasting
      car.vx *= FRICTION;
      car.vy *= FRICTION;

      // recompute forward/lateral after thrust+friction
      const fv2 = car.vx * cosH + car.vy * sinH;
      const lv2 = -car.vx * sinH + car.vy * cosH;

      // lateral grip (drift): partially kill lateral velocity each frame
      const effectiveGrip = car.handbrake ? HANDBRAKE_GRIP : GRIP;
      const newLateral = lv2 * Math.max(0, 1 - effectiveGrip);  // [M1] clamp >=0

      // expose lateral slip for skid marks (CAR-6)
      car.lateralSlip = Math.abs(lv2);

      // reconstruct velocity from forward + damped lateral
      car.vx = fv2 * cosH - newLateral * sinH;
      car.vy = fv2 * sinH + newLateral * cosH;

      // speed clamp
      const speed = Math.sqrt(car.vx * car.vx + car.vy * car.vy);
      const maxSpeed = fv2 >= 0 ? TOP_SPEED : TOP_REVERSE_SPEED;
      if (speed > maxSpeed) {
        const scale = maxSpeed / speed;
        car.vx *= scale;
        car.vy *= scale;
      }

      // steering: speed-scaled, inverts in reverse (sign(fv2)), ~0 at rest
      if (Math.abs(speed) > 1) {
        const speedFactor = Math.min(speed / TOP_SPEED, 1);
        const reverseSign = fv2 >= 0 ? 1 : -1;
        car.heading += STEER_RATE * steerInput * speedFactor * reverseSign * dt;
      }

      // update position
      car.x += car.vx * dt;
      car.y += car.vy * dt;

      // --- wall bounce ---
      if (car.x - CAR_RADIUS < 0) { car.x = CAR_RADIUS; car.vx *= -RESTITUTION; }
      if (car.x + CAR_RADIUS > ARENA_SIZE) { car.x = ARENA_SIZE - CAR_RADIUS; car.vx *= -RESTITUTION; }
      if (car.y - CAR_RADIUS < 0) { car.y = CAR_RADIUS; car.vy *= -RESTITUTION; }
      if (car.y + CAR_RADIUS > ARENA_SIZE) { car.y = ARENA_SIZE - CAR_RADIUS; car.vy *= -RESTITUTION; }

      // --- obstacle circle collisions ---
      for (const obs of obstacles) {
        const dx = car.x - obs.x;
        const dy = car.y - obs.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const minDist = CAR_RADIUS + obs.r;
        if (dist < minDist && dist > 0) {
          // push out
          const nx = dx / dist, ny = dy / dist;
          const overlap = minDist - dist;
          car.x += nx * overlap;
          car.y += ny * overlap;
          // reflect velocity along normal, scaled by RESTITUTION
          const dot = car.vx * nx + car.vy * ny;
          if (dot < 0) { // only reflect if moving towards obstacle
            car.vx -= (1 + RESTITUTION) * dot * nx;
            car.vy -= (1 + RESTITUTION) * dot * ny;
          }
        }
      }

      // --- skid marks recording ---
      const skidSpeed = Math.sqrt(car.vx * car.vx + car.vy * car.vy);
      const isSkidding = (car.lateralSlip > SKID_THRESHOLD) || (car.handbrake && skidSpeed > 20);
      if (isSkidding) {
        const cH = Math.cos(car.heading);
        const sH = Math.sin(car.heading);
        // rear corners of car (offset 15px behind center, 9px each side)
        const rx = car.x - cH * 15;
        const ry = car.y - sH * 15;
        skidMarks.push({
          x1: rx - sH * 9, y1: ry + cH * 9,
          x2: rx + sH * 9, y2: ry - cH * 9,
          alpha: Math.min(1, car.lateralSlip / SKID_MAX)
        });
        if (skidMarks.length > SKID_MAX) skidMarks.shift();
      }
    }

    function draw() {
      // --- camera transform: car stays at screen center ---
      const cameraX = car.x - canvas.width  / 2;
      const cameraY = car.y - canvas.height / 2;

      ctx.save();
      ctx.translate(-cameraX, -cameraY);

      // --- background (world-space fill across visible viewport) ---
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(cameraX, cameraY, canvas.width, canvas.height);

      // --- tiled grid (world-space, modulo-offset to cover viewport only) ---
      const startX = cameraX - (cameraX % GRID_SIZE + GRID_SIZE) % GRID_SIZE;
      const startY = cameraY - (cameraY % GRID_SIZE + GRID_SIZE) % GRID_SIZE;

      ctx.strokeStyle = '#333';
      ctx.lineWidth   = 1;
      ctx.beginPath();
      for (let x = startX; x <= cameraX + canvas.width + GRID_SIZE; x += GRID_SIZE) {
        ctx.moveTo(x, cameraY);
        ctx.lineTo(x, cameraY + canvas.height);
      }
      for (let y = startY; y <= cameraY + canvas.height + GRID_SIZE; y += GRID_SIZE) {
        ctx.moveTo(cameraX,                  y);
        ctx.lineTo(cameraX + canvas.width,   y);
      }
      ctx.stroke();

      // --- skid marks (world-space, under obstacles and car) ---
      ctx.lineCap = 'round';
      ctx.lineWidth = 4;
      for (const s of skidMarks) {
        ctx.strokeStyle = `rgba(0,0,0,${s.alpha * 0.6})`;
        ctx.beginPath();
        ctx.moveTo(s.x1, s.y1);
        ctx.lineTo(s.x2, s.y2);
        ctx.stroke();
      }

      // --- obstacles ---
      ctx.fillStyle = '#8e44ad';
      ctx.strokeStyle = '#6c3483';
      ctx.lineWidth = 2;
      for (const obs of obstacles) {
        ctx.beginPath();
        ctx.arc(obs.x, obs.y, obs.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      }

      // --- car draw (physics car — CAR-3) ---
      ctx.save();
      ctx.translate(car.x, car.y);
      ctx.rotate(car.heading);
      // body
      ctx.fillStyle = '#e74c3c';
      ctx.fillRect(-20, -10, 40, 20);
      // front indicator (darker stripe at forward end)
      ctx.fillStyle = '#922b21';
      ctx.fillRect(10, -10, 10, 20);
      ctx.restore();

      // --- exit world space ---
      ctx.restore();

      // --- HUD (screen-space — reset camera transform first) ---
      ctx.setTransform(1, 0, 0, 1, 0, 0);

      const speed = Math.round(Math.sqrt(car.vx * car.vx + car.vy * car.vy));
      const isThrottle  = !!(keys['KeyW'] || keys['ArrowUp']);
      const isBrake     = !!(keys['KeyS'] || keys['ArrowDown']);
      const isHandbrake = car.handbrake;
      const isLeft      = !!(keys['KeyA'] || keys['ArrowLeft']);
      const isRight     = !!(keys['KeyD'] || keys['ArrowRight']);

      // HUD background panel
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(10, 10, 200, 130);

      ctx.font = 'bold 18px monospace';
      ctx.textAlign = 'left';

      // Speed
      ctx.fillStyle = '#f0f0f0';
      ctx.fillText(`Speed: ${speed}`, 20, 34);

      // Input state indicators
      ctx.font = '14px monospace';
      ctx.fillStyle = isThrottle  ? '#2ecc71' : '#555';  ctx.fillText('▲ THROTTLE', 20, 56);
      ctx.fillStyle = isBrake     ? '#e74c3c' : '#555';  ctx.fillText('▼ BRAKE/REV', 20, 74);
      ctx.fillStyle = isHandbrake ? '#f39c12' : '#555';  ctx.fillText('◼ HANDBRAKE', 20, 92);
      ctx.fillStyle = (isLeft || isRight) ? '#3498db' : '#555';
      ctx.fillText(`${isLeft ? '◄' : ' '} STEER ${isRight ? '►' : ' '}`, 20, 110);

      // Controls legend
      ctx.fillStyle = '#888';
      ctx.font = '11px monospace';
      ctx.fillText('WASD / Arrows · Space · R=Reset', 20, 130);
    }

    // ============================================================
    // GAME LOOP
    // ============================================================

    let last = null;

    function loop(now) {
      if (last === null) last = now;
      const dt = Math.min(MAX_DT, (now - last) / 1000);
      last = now;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      update(dt);
      draw();

      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);

    // ============================================================
    // SKID MARKS — world-space segments rendered under the car
    // ============================================================
    const skidMarks = [];  // each entry: { x1, y1, x2, y2, alpha }

    // ============================================================
    // INPUT EVENT LISTENERS — CAR-4
    // ============================================================

    document.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      // prevent browser scroll for arrow keys and space
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) {
        e.preventDefault();
      }
      // R to reset car
      if (e.code === 'KeyR' || e.key === 'r' || e.key === 'R') {
        car.x = ARENA_SIZE / 2;
        car.y = ARENA_SIZE / 2;
        car.vx = 0;
        car.vy = 0;
        car.heading = 0;
        car.handbrake = false;
        car.lateralSlip = 0;
      }
    });

    document.addEventListener('keyup', (e) => {
      keys[e.code] = false;
    });
  </script>
</body>
</html>
