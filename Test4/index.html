<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top-Down Car Demo</title>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #111; }
    canvas { display: block; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <script>
    // ============================================================
    // TUNABLES — single source of truth for all gameplay constants
    // Do NOT add gameplay tunables outside this block.
    // ============================================================
    const ACCEL             = 1200;  // forward acceleration (px/s^2)
    const REVERSE_ACCEL     = 600;   // reverse acceleration (px/s^2)
    const TOP_SPEED         = 1800;  // max forward speed (px/s)
    const TOP_REVERSE_SPEED = 750;   // max reverse speed (px/s)
    const FRICTION          = 0.92;  // per-frame speed retention (0-1); speed *= FRICTION each frame
    const STEER_RATE        = 6.0;   // steering angular velocity (rad/s)
    const GRIP              = 0.85;  // lateral grip blend (0-1). INVARIANT: GRIP*MAX_DT < 1
    const HANDBRAKE_GRIP    = 0.05;  // grip while handbrake held (lets rear slide)
    const OBSTACLE_COUNT    = 10;    // number of obstacles
    const ARENA_SIZE        = 3000;  // arena width/height (px)
    const RESTITUTION       = 0.6;   // bounce factor on collision (not WALL_BOUNCE)
    const GRID_SIZE         = 100;   // floor grid cell size (px)
    const SKID_THRESHOLD    = 80;    // lateral speed (px/s) above which skids appear
    const SKID_MAX          = 300;   // lateral speed (px/s) at which skid opacity maxes
    const SKID_POOL_SIZE    = 300;   // max skid segments stored (count)
    const MAX_DT            = 0.033; // dt cap (s); 1/30 ~ 0.033 — stabilizes slow frames
    const BRAKE_MULTIPLIER  = 1.5;   // brake force vs ACCEL (braking stronger than accel)
    const CAR_RADIUS        = 18;    // car collision radius (px)
    const OBS_RADIUS        = 30;    // obstacle radius (px)

    // ============================================================
    // CANVAS SETUP
    // ============================================================
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // ============================================================
    // GAME STATE (filled across later phases)
    // ============================================================
    const car = { x: ARENA_SIZE / 2, y: ARENA_SIZE / 2, vx: 0, vy: 0, heading: 0, handbrake: false, lateralSlip: 0 };
    const keys = {};            // held-key map, keyed by event.code (Phase 2: input)
    const obstacles = [];       // static circles (Phase 3: obstacles)
    const skidMarks = [];       // world-space segments (Phase 3: skids)

    // ============================================================
    // UPDATE / DRAW (filled across later phases)
    // ============================================================
    function update(dt) {
      // read held keys (populated by Phase 3 listeners; harmless empty until then)
      const throttle   = (keys['KeyW'] || keys['ArrowUp'])    ? 1 : 0;
      const brake      = (keys['KeyS'] || keys['ArrowDown'])  ? 1 : 0;
      const steerInput = ((keys['KeyD'] || keys['ArrowRight']) ? 1 : 0)
                       - ((keys['KeyA'] || keys['ArrowLeft'])  ? 1 : 0);
      car.handbrake = !!keys['Space'];

      const cosH = Math.cos(car.heading);
      const sinH = Math.sin(car.heading);

      // forward speed component (sign decides brake-vs-reverse)
      const forwardVel = car.vx * cosH + car.vy * sinH;

      // throttle along heading
      if (throttle) {
        car.vx += cosH * ACCEL * dt;
        car.vy += sinH * ACCEL * dt;
      }
      // brake if moving forward, else reverse
      if (brake) {
        if (forwardVel > 0) {
          car.vx -= cosH * ACCEL * dt * BRAKE_MULTIPLIER;
          car.vy -= sinH * ACCEL * dt * BRAKE_MULTIPLIER;
        } else {
          car.vx -= cosH * REVERSE_ACCEL * dt;
          car.vy -= sinH * REVERSE_ACCEL * dt;
        }
      }

      // friction: coast to stop when no input
      car.vx *= FRICTION;
      car.vy *= FRICTION;

      // decompose into forward + lateral axes (relative to heading)
      const fv = car.vx * cosH + car.vy * sinH;
      const lv = -car.vx * sinH + car.vy * cosH;

      // lateral grip = drift: partially kill lateral velocity; clamp factor >= 0
      const effectiveGrip = car.handbrake ? HANDBRAKE_GRIP : GRIP;
      const newLateral = lv * Math.max(0, 1 - effectiveGrip);
      car.lateralSlip = Math.abs(lv); // exposed for Phase 5 skids

      // reconstruct velocity from forward + damped lateral
      car.vx = fv * cosH - newLateral * sinH;
      car.vy = fv * sinH + newLateral * cosH;

      // speed clamp (top forward vs top reverse)
      const speed = Math.sqrt(car.vx * car.vx + car.vy * car.vy);
      const maxSpeed = fv >= 0 ? TOP_SPEED : TOP_REVERSE_SPEED;
      if (speed > maxSpeed) {
        const s = maxSpeed / speed;
        car.vx *= s;
        car.vy *= s;
      }

      // steering: speed-scaled, ~0 at rest, inverts in reverse
      if (speed > 1) {
        const speedFactor  = Math.min(speed / TOP_SPEED, 1);
        const reverseSign  = fv >= 0 ? 1 : -1;
        car.heading += STEER_RATE * steerInput * speedFactor * reverseSign * dt;
      }

      // integrate position
      car.x += car.vx * dt;
      car.y += car.vy * dt;
    }
    function draw() {
      // camera: car stays at screen center
      const cameraX = car.x - canvas.width  / 2;
      const cameraY = car.y - canvas.height / 2;

      ctx.save();
      ctx.translate(-cameraX, -cameraY);

      // world background across visible viewport
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(cameraX, cameraY, canvas.width, canvas.height);

      // tiled grid — modulo offset so only the visible viewport is drawn
      const startX = cameraX - ((cameraX % GRID_SIZE) + GRID_SIZE) % GRID_SIZE;
      const startY = cameraY - ((cameraY % GRID_SIZE) + GRID_SIZE) % GRID_SIZE;
      ctx.strokeStyle = '#333';
      ctx.lineWidth   = 1;
      ctx.beginPath();
      for (let x = startX; x <= cameraX + canvas.width + GRID_SIZE; x += GRID_SIZE) {
        ctx.moveTo(x, cameraY);
        ctx.lineTo(x, cameraY + canvas.height);
      }
      for (let y = startY; y <= cameraY + canvas.height + GRID_SIZE; y += GRID_SIZE) {
        ctx.moveTo(cameraX, y);
        ctx.lineTo(cameraX + canvas.width, y);
      }
      ctx.stroke();

      // car (directional: body + front stripe shows heading)
      ctx.save();
      ctx.translate(car.x, car.y);
      ctx.rotate(car.heading);
      ctx.fillStyle = '#e74c3c';
      ctx.fillRect(-20, -10, 40, 20);
      ctx.fillStyle = '#922b21';
      ctx.fillRect(10, -10, 10, 20); // front-end stripe
      ctx.restore();

      ctx.restore(); // exit world space
    }

    // ============================================================
    // GAME LOOP
    // ============================================================
    let last = null;
    function loop(now) {
      if (last === null) last = now;
      const dt = Math.min(MAX_DT, (now - last) / 1000);
      last = now;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>
</html>
